name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Python ${{ matrix.python }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ['3.10', '3.11', '3.12', '3.13', '3.14']
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python }}
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install package
        run: python -m pip install --disable-pip-version-check -e ".[browser]"
      - name: Test
        run: |
          python -m unittest discover -s tests -v
          python -m compileall -q aimlib tests
          python -m pip check

  package:
    name: Build package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Build and inspect distributions
        env:
          SOURCE_DATE_EPOCH: '1704067200'
        run: |
          python tools/audit_public_package.py
          python -m pip install --disable-pip-version-check build==1.5.1 twine==6.2.0
          for build_number in 1 2; do
            source_dir="$RUNNER_TEMP/source-$build_number"
            dist_dir="$RUNNER_TEMP/dist-$build_number"
            mkdir -p "$source_dir" "$dist_dir"
            git archive HEAD | tar -x -C "$source_dir"
            python -m build --wheel --outdir "$dist_dir" "$source_dir"
          done
          wheel_one=("$RUNNER_TEMP/dist-1"/aimlib-*.whl)
          wheel_two=("$RUNNER_TEMP/dist-2"/aimlib-*.whl)
          test -f "${wheel_one[0]}"
          test -f "${wheel_two[0]}"
          cmp -s "${wheel_one[0]}" "${wheel_two[0]}"
          mkdir dist
          cp "${wheel_one[0]}" dist/
          python -m build --sdist --outdir dist "$RUNNER_TEMP/source-1"
          python -m twine check --strict dist/*
          python -m venv wheel-test
          wheel-test/bin/python -m pip install --disable-pip-version-check dist/aimlib-*.whl
          expected=$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')
          cd "$RUNNER_TEMP"
          EXPECTED_VERSION="$expected" "$GITHUB_WORKSPACE/wheel-test/bin/python" -c \
            "import os, aimlib; from importlib.metadata import version; assert version('aimlib') == os.environ['EXPECTED_VERSION']"
