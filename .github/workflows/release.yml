name: Publish to PyPI

on:
  release:
    types: [published]

permissions: {}

jobs:
  build:
    name: Build release distributions
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Verify tag and test package
        run: |
          python tools/audit_public_package.py
          git fetch --no-tags --depth=1000 origin +refs/heads/main:refs/remotes/origin/main
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main || {
            echo 'release commit is not on main' >&2
            exit 1
          }
          python - <<'PY'
          import os
          import tomllib
          from pathlib import Path

          version = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))["project"]["version"]
          tag = os.environ["GITHUB_REF_NAME"]
          if tag != f"v{version}":
              raise SystemExit(f"release tag {tag!r} does not match package version v{version}")
          PY
          python -m pip install --disable-pip-version-check -e ".[browser]"
          python -m unittest discover -s tests -v
          python -m pip check
      - name: Build and inspect distributions
        env:
          SOURCE_DATE_EPOCH: '1704067200'
        run: |
          python -m pip install --disable-pip-version-check build==1.5.1 twine==6.2.0
          for build_number in 1 2; do
            source_dir="$RUNNER_TEMP/source-$build_number"
            dist_dir="$RUNNER_TEMP/dist-$build_number"
            mkdir -p "$source_dir" "$dist_dir"
            git archive HEAD | tar -x -C "$source_dir"
            python -m build --wheel --outdir "$dist_dir" "$source_dir"
          done
          wheel_one=("$RUNNER_TEMP/dist-1"/aimlib-*.whl)
          wheel_two=("$RUNNER_TEMP/dist-2"/aimlib-*.whl)
          test -f "${wheel_one[0]}"
          test -f "${wheel_two[0]}"
          cmp -s "${wheel_one[0]}" "${wheel_two[0]}"
          mkdir dist
          cp "${wheel_one[0]}" dist/
          python -m build --sdist --outdir dist "$RUNNER_TEMP/source-1"
          python -m twine check --strict dist/*
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: python-package-distributions
          path: dist/
          if-no-files-found: error
          retention-days: 14

  publish:
    name: Publish distributions
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/aimlib
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: python-package-distributions
          path: dist/
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
